feature: 2026-05-12-app-shortcut-checkin
created: 2026-05-12
status: pending

steps:
  - action: "Step 1 Shortcut 入口骨架：静态 shortcut 资源与内部 ShortcutTarget"
    exit_signal: "普通启动 target 为 null，两个 action 能映射到对应目标，且‘扫码签到’在 launcher shortcut 列表中排第一"
    status: done

  - action: "Step 2 冷/热启动目标传递：MainActivity 持有 pending target 并传入 LightXinNavHost"
    exit_signal: "冷启动与后台热启动都能在 Compose 层看到 pending target"
    status: done

  - action: "Step 3 导航消费编排：已登录执行扫码/查寝导航，未登录保留 target 到登录成功后恢复"
    exit_signal: "扫码返回栈、查寝详情/列表落点、登录后恢复路径符合验收场景"
    status: done

  - action: "Step 4 查寝目标预解析与 splash 协调"
    exit_signal: "有任务时复用预解析 taskDateId，无任务或失败时进入列表并提示，失败或超时不阻塞启动"
    status: done

  - action: "Step 5 扫码结果反馈替换：signResult 从 Snackbar 改为 BottomSheet"
    exit_signal: "扫码成功/失败结果都以 Sheet 出现，关闭后不会重复弹"
    status: done

  - action: "Step 6 编译与人工验证"
    exit_signal: "构建通过，关键手工路径有验证记录或明确说明无法验证的设备条件"
    status: pending

